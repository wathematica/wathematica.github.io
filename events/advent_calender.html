            <h2 class="section__title">アドベントカレンダーとは</h2>
            <p class="section__text">
                アドベントカレンダーは、12月1日から25日までの期間に毎日1つずつ記事を公開していく企画です。
                Wathematicaでは、部員がそれぞれの興味ある数学・物理・化学などのテーマについて記事を執筆し、日替わりで公開しています。
            </p>
